---
- name: Force Handlers Test Playbook
  hosts: localhost
  connection: local
  gather_facts: false
  force_handlers: false
  tasks:
    - name: Trigger a handler
      ansible.builtin.command: echo "triggering handler"
      changed_when: true
      notify: Test handler

    - name: Display message
      ansible.builtin.debug:
        msg: "Force handlers test completed"

  handlers:
    - name: Test handler
      ansible.builtin.debug:
        msg: "Handler was executed successfully"
