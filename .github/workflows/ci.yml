---
name: Continuous Integration

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ${{ github.ref }}-${{ github.workflow }}
    cancel-in-progress: true

permissions:
    contents: read
    security-events: write
    actions: read
    pull-requests: write
    issues: read
    id-token: write

jobs:
    ci:
        uses: arillso/.github/.github/workflows/ci-go.yml@2026-03-11

    lint:
        uses: arillso/.github/.github/workflows/ci-lint.yml@2026-03-11
        with:
            enable_shellcheck: true

    security-secrets:
        uses: arillso/.github/.github/workflows/security-secrets.yml@2026-03-11

    claude-review:
        uses: arillso/.github/.github/workflows/ai-claude-review.yml@2026-03-11
        if: github.event_name == 'pull_request' && github.event.action == 'opened'
        secrets:
            CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
